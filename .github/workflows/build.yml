name: HOSC Language CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Build project
        shell: msys2 {0}
        run: |
          mingw32-make -C tools all

      - name: Run tests
        shell: msys2 {0}
        run: |
          mingw32-make -C tools test

      - name: Integration Quality Gate
        shell: pwsh
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"
          powershell -File tools/quality_gate.ps1
